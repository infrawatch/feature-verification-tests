name: PEP8
on: [push, pull_request]

permissions:
  contents: read

jobs:
  pep8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8
