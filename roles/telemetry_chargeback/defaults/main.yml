---
# OpenStack CLI command
openstack_cmd: "openstack"

# Debug mode set
cloudkitty_debug: false
cloudkitty_debug_dir: "{{ (cloudkitty_debug | bool) | ternary(artifacts_dir_zuul + '/debug_ck_db', '') }}"

# Directory paths
logs_dir_zuul: "{{ cifmw_basedir }}/logs"
artifacts_dir_zuul: "{{ cifmw_basedir }}/artifacts"
cert_dir: "{{ cifmw_basedir }}/ck-certs"
local_cert_dir: "{{ cifmw_basedir }}/flush_certs"
remote_cert_dir: "osp-certs"

# Output file paths
cloudkitty_data_file: "{{ artifacts_dir_zuul }}/{{ scenario_name }}{{ cloudkitty_synth_data_suffix }}"
cloudkitty_synth_totals_file: "{{ artifacts_dir_zuul }}/{{ scenario_name }}{{ cloudkitty_synth_totals_metrics_suffix }}"
cloudkitty_loki_totals_file: "{{ artifacts_dir_zuul }}/loki_total_rate{{ cloudkitty_loki_data_suffix }}"
cloudkitty_rate_summary_file: "{{ artifacts_dir_zuul }}/loki_total_rate{{ cloudkitty_loki_totals_metrics_suffix }}"


# Cloudkitty certificates and secrets
cert_secret_name: "cert-cloudkitty-client-internal"
client_secret: "secret/cloudkitty-lokistack-gateway-client-http"
ca_configmap: "cm/cloudkitty-lokistack-ca-bundle"

# LogQL Query
logql_query: "{{ loki_query | default('{service=\"cloudkitty\"}') }}"

# OpenShift/Kubernetes settings
cloudkitty_namespace: "openstack"
openstackpod: "openstackclient"

# Time window settings
lookback: 6
limit: 50

# List of test scenario files to run
cloudkitty_test_scenarios: ["test_static.yml" , "test_dyn_basic.yml"]
