---
- name: "TEST Get Rate and Qty by type from CloudKitty {{ item }}"
  ansible.builtin.command:
    cmd: "{{ openstack_cmd }} --rating-api-version 2 rating summary get -f yaml -g type"
  register: cost_totals_by_type
  changed_when: false
  failed_when: cost_totals_by_type.rc != 0

- name: "Print the rating by type {{ item }}"
  ansible.builtin.debug:
    var: cost_totals_by_type.stdout

- name: "Save rating output for CI logs {{ item }}"
  ansible.builtin.copy:
    content: "{{ cost_totals_by_type.stdout }}"
    dest: "{{ artifacts_dir_zuul }}/{{ scenario_result.file_name }}-rating.yml"
    mode: '0644'

- name: "TEST Get Rate and Qty Summary from CloudKitty {{ item }}"
  ansible.builtin.command:
    cmd: >-
      {{ openstack_cmd }} --rating-api-version 2 rating summary get -f yaml
      -b "{{ scenario_result.synth_summary.time.begin_step.begin }}"
      -e "{{ scenario_result.synth_summary.time.end_step.end }}"
  register: cost_totals_summary
  changed_when: false
  failed_when: cost_totals_summary.rc != 0

- name: "Print the rating summary {{ item }}"
  ansible.builtin.debug:
    var: cost_totals_summary.stdout

- name: "Update scenario_result with CloudKitty rating for {{ item }}"
  ansible.builtin.set_fact:
    scenario_result: >-
      {{ scenario_result | combine({
        'ck_rating_by_type': cost_totals_by_type.stdout | from_yaml,
        'ck_rating_summary': cost_totals_summary.stdout | from_yaml
      }) }}
