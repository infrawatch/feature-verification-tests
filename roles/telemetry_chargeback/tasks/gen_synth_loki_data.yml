---
- name: "Set variables dynamically for {{ scenario_name }}"
  ansible.builtin.set_fact:
    cloudkitty_data_file: "{{ artifacts_dir_zuul }}/{{ scenario_name }}{{ cloudkitty_synth_data_suffix }}"
    cloudkitty_synth_totals_file: "{{ artifacts_dir_zuul }}/{{ scenario_name }}{{ cloudkitty_synth_totals_metrics_suffix }}"
    cloudkitty_test_file: "{{ cloudkitty_scenario_dir }}/{{ scenario_name }}.yml"

- name: "Check for preexisting output file"
  ansible.builtin.stat:
    path: "{{ cloudkitty_data_file }}"
  register: file_preexists

- name: "Generate Synthetic Data for {{ scenario_name }}"
  ansible.builtin.command:
    cmd: >
      python3 "{{ cloudkitty_synth_script }}"
      --tmpl "{{ cloudkitty_data_template }}"
      -t "{{ cloudkitty_test_file }}"
      -o "{{ cloudkitty_data_file }}"
  register: script_output
  when: not file_preexists.stat.exists | bool
  changed_when: script_output.rc == 0

- name: "Generate chargeback rating from synthetic data file {{ scenario_name }}"
  ansible.builtin.command:
    cmd: >
      python3 "{{ cloudkitty_summary_script }}"
      -j "{{ cloudkitty_data_file }}"
      -o "{{ cloudkitty_synth_totals_file }}"
      {% if cloudkitty_debug | bool %}--debug --debug_dir "{{ cloudkitty_debug_dir }}"{% endif %}
  register: synth_rating_info
  when: not file_preexists.stat.exists | bool
  changed_when: synth_rating_info.rc == 0

- name: "Load metrics from YAML file"
  ansible.builtin.include_vars:
    file: "{{ cloudkitty_synth_totals_file }}"
    name: synth_data_rates
