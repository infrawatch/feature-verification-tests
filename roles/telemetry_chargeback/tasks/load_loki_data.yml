---
- name: "Ingest CloudKitty data log for {{ item }}"
  ansible.builtin.include_tasks:
    file: ingest_loki_data.yml

- name: "Flush data to Loki storage for {{ item }}"
  ansible.builtin.include_tasks:
    file: flush_loki_data.yml

- name: "Retrieve data log from Loki for {{ item }}"
  ansible.builtin.include_tasks:
    file: retrieve_loki_data.yml
