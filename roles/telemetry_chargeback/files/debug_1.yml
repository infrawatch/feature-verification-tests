# Scenario configuration for synthetic Loki log data generation

# Time range configuration
generation:
  days: 1
  step_seconds: 43200

# Log type definitions
log_types:
  - name: ceilometer_image_size
    type: ceilometer_image_size
    unit: MiB
    description: null
    qty: 20.6
    price: 0.02
    groupby:
      resource: tenant-01
      project: null
      user: null
    metadata:
      container_format: bare
      disk_format: qcow2

# Required fields for validation (top-level fields only, not nested in groupby)
required_fields:
  - type
  - unit
  - qty
  - price
  - groupby
  - metadata

# Date field names to add to groupby
date_fields:
  - week_of_the_year
  - day_of_the_year
  - month
  - year

# Loki stream configuration
loki_stream:
  service: cloudkitty
