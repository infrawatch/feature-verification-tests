---
# Scenario configuration for synthetic Loki log data generation

# Time range configuration
generation:
  days: 1
  step_seconds: 14400

# Log type definitions (single "type" = identifier and value pushed to output)
log_types:
  - type: ceilometer_image_size
    description: "Size of ceilometer image"
    unit: MiB
    qty:
      - 10000
    price:
      - 0.10
    groupby:
      resource: tenant-01
      user: null
      project: null
    metadata:
      container_format: bare
      disk_format: qcow2
 
  - type: ceilometer_image_test
    description: "Size of ceilometer test"
    unit: B
#   factor: 1
    qty:
      - 10000
    price:
      - 0.10
    groupby:
      resource: tenant-01
      user: null
      project: null
    metadata:
      container_format: bare
      disk_format: qcow2

  - type: ceilometer_cpu
    description: "max number of cpus used in time step"
    unit: instance
    alt_name: instance
    qty:
      - 1
    price:
      - 5.00
    groupby:
      resource: tenant-02
      user: null
      project: null
      flavor_name: null
      flavor_id: null
    mutate: NUMBOOL

  - type: ceilometer_ip_floating
    description: null
    unit: ip
    qty:
      - 5
    price:
      - 1.00
    groupby:
      resource: tenant-01
      user: null
      project: null
    metadata:
      state: null
    mutate: NUMBOOL

  - type: ceilometer_disk_ephemeral_size
    description: "Max at each timestep"
    unit: GiB
    qty:
      - 0.0
    price:
      - 0.0
    groupby:
      resource: tenant-01
      user: null
      project: null
    metadata:
      type: null

  - type: ceilometer_disk_root_size
    description: null
    unit: GiB
    qty:
      - 10000
    price:
      - 0.10
    groupby:
      resource: tenant-02
      user: null
      project: null
    metadata:
      type: null

  - type: ceilometer_network_outgoing_bytes
    description: null
    unit: B
    qty:
      - 0.0
    price:
      - 0.0
    groupby:
      resource: tenant-01
      user: null
      project: null
    metadata:
      vm_instance: null

  - type: ceilometer_network_incoming_bytes
    description: null
    unit: B
    qty:
      - 0.0
    price:
      - 0.0
    groupby:
      resource: tenant-02
      user: null
      project: null
    metadata:
      vm_instance: null

# Required fields for validation (top-level fields only, not nested in groupby)
required_fields:
  - type
  - unit
  - qty
  - price
  - groupby

# Date field names to add to groupby
date_fields:
  - week_of_the_year
  - day_of_the_year
  - month
  - year

# Loki stream configuration
loki_stream:
  service: cloudkitty
