---
# Scenario configuration for synthetic Loki log data generation

# Time range configuration
generation:
  days: 1
  step_seconds: 7200

# Log type definitions
log_types:
  - name: ceilometer_image_size
    type: ceilometer_image_size
    unit: MiB
    description: "Size of ceilometer image"
    qty:
      - 20.6
      - 25.0
      - 26.0
      - 30.5
    price:
      - 0.02
      - 0.03
      - 0.04
      - 0.07
      - 0.10
    groupby:
      id: null
      user_id: null
      project_id: null
    metadata:
      container_format: null
      disk_format: null

  - name: instance
    type: instance
    unit: instance
    description: "max number of cpus used in time step"
    qty:
      - 1.0
    price:
      - 0.3
    groupby:
      id: null
      user_id: null
      project_id: null
    metadata:
      flavor_name: null
      flavor_id: ""
      vcpus: ""

# Required fields for validation (top-level fields only, not nested in groupby)
required_fields:
  - type
  - unit
  - qty
  - price
  - groupby
  - metadata

# Date field names to add to groupby
date_fields:
  - week_of_the_year
  - day_of_the_year
  - month
  - year

# Loki stream configuration
loki_stream:
  service: cloudkitty
