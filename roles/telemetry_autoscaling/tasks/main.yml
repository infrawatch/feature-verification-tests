---
# tasks file for telemetry_autoscaling
  # TODO: Update the pre-checks to include the resources that the stack expects to exist
  # i.e. networks, flavor, image, security group
- name: Gather list of vars files
  set_fact:
    vars_files: "{{ lookup('fileglob', vars_path + '/*.yml', wantlist=True) }}"

- name: Include multiple variable files
  include_vars: "{{ item }}"
  with_items: "{{ vars_files }}"

- name: initialize empty results file
  delegate_to: localhost
  copy:
    content: |
      <?xml version="1.0" ?>
      <testsuite errors="0" failures="#failures#" name="autoscaling" skipped="0" tests="#tests#">
      </testsuite>
    dest: "{{ logs_dir }}/test_run_result.xml"

- name: inititalize number of tests and failures
  set_fact:
    number_of_tests: 0
    number_of_failures: 0

- name: Check pre-reqs for autoscaling
  ansible.builtin.include_tasks: 
    file: verify_autoscaling.yml
  tags: precheck

- name: Create the heat templates
  ansible.builtin.include_tasks: 
    file: configure_heat.yml
  tags: setup

- name: Launch the stack
  ansible.builtin.include_tasks: 
    file: creating_stack.yml
  tags: create

- name: Run the autoscaling tests
  ansible.builtin.include_tasks: 
    file: test_autoscaling.yml
  tags: test

- name: modify test result with number of failures
  delegate_to: localhost
  replace:
    path: "{{ logs_dir }}/autoscaling_result.xml"
    regexp: "#failures#"
    replace: "{{ number_of_failures }}"

- name: modify test result with number of tests
  delegate_to: localhost
  replace:
    path: "{{ logs_dir }}/autoscaling_result.xml"
    regexp: "#tests#"
    replace: "{{ number_of_tests }}"

- name: Run the cleanup task
  ansible.builtin.include_tasks: 
    file: post_teardown.yml
  tags: cleanup
